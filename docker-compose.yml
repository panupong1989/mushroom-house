services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mush
      POSTGRES_PASSWORD: mushpass
      POSTGRES_DB: mushroom
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  pgdata:
