[platformio]
default_envs = esp32dev

; ---- ค่าร่วมทุก env ----
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7
    4-20ma/ModbusMaster@^2.0.1
    milesburton/DallasTemperature@^3.11
    paulstoffregen/OneWire@^2.3.8
build_flags = -DCORE_DEBUG_LEVEL=2

; ---- firmware เฟสแรก: อ่านเซนเซอร์ + ยิง Supabase (ไม่มี control/relay) ----
[env:esp32dev]
build_src_filter = +<*> -<rom_scan.cpp>

; ---- เครื่องมือหน้างาน: สแกน ROM id ของ DS18B20 ทั้ง 7 ตัว + ผูกเข้าตำแหน่ง เก็บ NVS ----
; รัน: pio run -e romscan -t upload ; pio device monitor -e romscan
[env:romscan]
build_src_filter = +<*> -<main.cpp>
