[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7
    4-20ma/ModbusMaster@^2.0.1
    milesburton/DallasTemperature@^3.11
    paulstoffregen/OneWire@^2.3.8
    esp32async/AsyncTCP@^3
    esp32async/ESPAsyncWebServer@^3
    ; legacy MQTT (โหมดเดิม) — เพิ่มกลับเฉพาะเมื่อ build ด้วย -DUSE_MQTT=1
    ; knolleary/PubSubClient@^2.8
build_flags = -DCORE_DEBUG_LEVEL=2

; ---- native unit test (host) สำหรับ interlock ใน control_fsm.cpp ----
; รัน: pio test -e native  (ไม่ใช่ pio run — default_envs กันไว้ให้ pio run = esp32dev เท่านั้น)
; คอมไพล์เฉพาะ control_fsm.cpp + shim Arduino/relay ใน test/ (ไฟล์อื่นพึ่ง WiFi/ESPAsync ไม่รันบน host)
[env:native]
platform = native
build_src_filter = +<control_fsm.cpp>
build_flags = -I test_shim -std=gnu++17
test_framework = unity
