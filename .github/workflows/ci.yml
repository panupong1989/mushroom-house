name: CI
on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npx tsc --noEmit      # type-check (ยังไม่มี test -> เพิ่มทีหลัง)

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install platformio
      - run: pio run -d firmware/esp32-controller
        continue-on-error: true      # skeleton -> ยังไม่บังคับผ่าน (ปลดเมื่อ v1 เสร็จ)
