name: CI
on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mush
          POSTGRES_PASSWORD: mushpass
          POSTGRES_DB: mushroom
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mush -d mushroom"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mush:mushpass@localhost:5432/mushroom
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm run migrate
      - run: npx tsc --noEmit
      - run: npm test

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install platformio
      - run: pio run -d firmware/esp32-controller
      - run: pio test -e native -d firmware/esp32-controller   # interlock unit tests (host)
