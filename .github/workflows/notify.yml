name: Notify
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  pr-opened:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -H "Title: PR #${{ github.event.pull_request.number }} รอรีวิว" \
               -H "Priority: high" -H "Tags: eyes" \
               -H "Click: ${{ github.event.pull_request.html_url }}" \
               -d "${{ github.event.pull_request.title }}" \
               https://ntfy.sh/mushroom-beer-x7k2

  ci-failed:
    # แจ้งเฉพาะตอน CI แดงเท่านั้น
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -H "Title: CI แดง ❌" \
               -H "Priority: high" -H "Tags: rotating_light" \
               -H "Click: ${{ github.event.workflow_run.html_url }}" \
               -d "branch: ${{ github.event.workflow_run.head_branch }}" \
               https://ntfy.sh/mushroom-beer-x7k2
